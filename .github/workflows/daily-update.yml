name: Daily Landed Palm Price Update

on:
  workflow_dispatch:
  schedule:
    - cron: '30 14 * * 1-5'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh tracker outputs
        run: python tracker.py

      - name: Commit updated files
        run: |
          if git diff --quiet -- data/prices.csv output/weekly_summary.txt; then
            echo "No tracker changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv output/weekly_summary.txt
          git commit -m "Update daily landed palm price tracker"
          git push
